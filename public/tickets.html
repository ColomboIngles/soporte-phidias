<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tickets Soporte</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
table { width:100%; border-collapse: collapse; background:white; }
th, td { padding:10px; border:1px solid #ddd; }
th { background:#1e593d; color:white; }
button { padding:5px 10px; margin:2px; cursor:pointer; }
.badge { padding:5px 10px; border-radius:8px; color:white; }
.abierto { background:orange; }
.cerrado { background:green; }
</style>

</head>

<body>

<h2>📋 Tickets</h2>

<table>
<thead>
<tr>
<th>Título</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>
const API = "";

// ===============================
async function cargarTickets() {
  const res = await fetch(API + "/tickets");
  const tickets = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  tickets.forEach(t => {
    const fila = document.createElement("tr");

    fila.innerHTML = `
      <td>${t.titulo}</td>
      <td><span class="badge ${t.estado}">${t.estado}</span></td>
      <td>
        <button onclick="verTicket('${t.id}')">Abrir</button>
        <button onclick="cerrarTicket('${t.id}')">Cerrar</button>
      </td>
    `;

    tabla.appendChild(fila);
  });
}

// ===============================
async function verTicket(id) {
  console.log("ID:", id);

  const res = await fetch("/tickets/" + id);

  if (!res.ok) {
    alert("❌ Ticket no encontrado");
    return;
  }

  const t = await res.json();

  alert(`
Título: ${t.titulo}
Estado: ${t.estado}
Descripción: ${t.descripcion}
Categoría: ${t.categoria || "-"}
Prioridad: ${t.prioridad || "-"}
  `);
}

// ===============================
async function cerrarTicket(id) {
  await fetch("/tickets/" + id + "/cerrar", {
    method: "PUT"
  });

  cargarTickets();
}

cargarTickets();
</script>

</body>
</html>
