services:
  - type: web
    name: soporte-phidias-api
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SECRET
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: FRONTEND_APP_URL
        sync: false
      - key: SUPPORT_ALLOWED_EMAIL_DOMAINS
        sync: false
      - key: PASSWORD_ACTIVATION_TOKEN_TTL_HOURS
        sync: false
